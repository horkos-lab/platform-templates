apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: client-onboarding
  title: Onboarding de Nuevo Cliente
  description: >
    Registra un nuevo cliente en el portal, crea su repositorio de documentación
    en GitHub y genera el checklist de onboarding.
  tags:
    - client
    - onboarding
    - documentation
spec:
  owner: group:default/platform-team
  type: documentation

  parameters:
    - title: Información del Cliente
      required:
        - clientName
        - clientTitle
        - accountManager
        - initialDomainSlug
        - initialDomainTitle
      properties:
        clientName:
          title: Identificador del Cliente (slug)
          type: string
          description: "Identificador único sin espacios ni mayúsculas. Ej: acme"
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        clientTitle:
          title: Nombre Completo de la Empresa
          type: string
          description: "Nombre comercial tal como aparecerá en el portal. Ej: Acme"
        accountManager:
          title: Account Manager Asignado
          type: string
          description: Miembro del equipo responsable de gestionar esta cuenta.
          enum:
            - cesar
            - ronal
            - jorge
          enumNames:
            - Cesar
            - Ronal
            - Jorge
        initialDomainSlug:
          title: Identificador del Dominio Inicial (slug)
          type: string
          description: "Slug del primer dominio de negocio del cliente. Ej: acme-domain"
          pattern: '^[a-z0-9-]+$'
          default: main-domain
        initialDomainTitle:
          title: Nombre del Dominio Inicial
          type: string
          description: "Nombre descriptivo del primer dominio de negocio. Ej: Acme Domain"
          default: Main Domain

    - title: Repositorio de Documentación
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Ubicación del Repositorio
          type: string
          description: Repositorio GitHub donde se almacenará la documentación del cliente.
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch-template
      name: Generar estructura de documentación
      action: fetch:template
      input:
        url: ./skeleton
        values:
          clientName: ${{ parameters.clientName }}
          clientTitle: ${{ parameters.clientTitle }}
          accountManager: ${{ parameters.accountManager }}
          initialDomainSlug: ${{ parameters.initialDomainSlug }}
          initialDomainTitle: ${{ parameters.initialDomainTitle }}

    - id: publish
      name: Publicar repositorio en GitHub
      action: publish:github
      input:
        description: "Documentación y onboarding: ${{ parameters.clientTitle }}"
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: private

    - id: register
      name: Registrar cliente en el Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Perfil del Cliente en Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
      - title: Repositorio de Documentación
        icon: github
        url: ${{ steps['publish'].output.remoteUrl }}
