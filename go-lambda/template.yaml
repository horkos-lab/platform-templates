apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: go-lambda
  title: Go Lambda Function
  description: Función AWS Lambda en Go con arquitectura hexagonal, Terraform (API GW HTTP v2), slog y pipelines de GitHub Actions
  tags:
    - go
    - aws
    - lambda
    - terraform
    - hexagonal
spec:
  owner: group:default/platform-team
  type: service

  parameters:
    - title: Información de la función
      required:
        - name
      properties:
        name:
          title: Nombre de la función
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
          description: Nombre del repositorio y de la función Lambda
          ui:autofocus: true
          ui:help: Solo minúsculas, números y guiones. Ej. payment-processor
        description:
          title: Descripción
          type: string
          description: Descripción breve del propósito de la función
        awsRegion:
          title: Región AWS
          type: string
          default: us-east-1
          enum:
            - us-east-1
            - us-west-2
            - eu-west-1
            - eu-central-1
            - ap-southeast-1
          enumNames:
            - 'US East (N. Virginia) — us-east-1'
            - 'US West (Oregon) — us-west-2'
            - 'Europe (Ireland) — eu-west-1'
            - 'Europe (Frankfurt) — eu-central-1'
            - 'Asia Pacific (Singapore) — ap-southeast-1'
        architecture:
          title: Arquitectura
          type: string
          default: arm64
          enum:
            - arm64
            - amd64
          enumNames:
            - 'arm64 (Graviton2 — 20% más barato, recomendado)'
            - 'amd64 (x86_64)'

    - title: Ubicación del repositorio en GitHub
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repositorio GitHub
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch
      name: Generar archivos del skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          awsRegion: ${{ parameters.awsRegion }}
          architecture: ${{ parameters.architecture }}
          repoUrl: ${{ parameters.repoUrl }}

    - id: publish
      name: Publicar en GitHub
      action: publish:github
      input:
        description: ${{ parameters.description or 'Función Lambda en Go — ' + parameters.name }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: private

    - id: register
      name: Registrar en el catálogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repositorio en GitHub
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Ver en el catálogo
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
