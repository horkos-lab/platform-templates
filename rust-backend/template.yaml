apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: rust-backend
  title: Rust Backend Service
  description: Crea un servicio HTTP en Rust con Axum, Dockerfile y manifests K8s
  tags:
    - rust
    - axum
    - kubernetes
spec:
  owner: group:default/platform-team
  type: service

  parameters:
    - title: Información del servicio
      required:
        - name
        - port
      properties:
        name:
          title: Nombre del servicio
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
          description: Nombre del repositorio y del servicio
          ui:autofocus: true
          ui:help: Solo minúsculas, números y guiones. Ej. my-service
        port:
          title: Puerto HTTP
          type: integer
          default: 8080
          description: Puerto en el que escuchará el servicio

    - title: Ubicación del repositorio en GitHub
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repositorio GitHub
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch
      name: Generar archivos del skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          port: ${{ parameters.port }}
          repoUrl: ${{ parameters.repoUrl }}

    - id: publish
      name: Publicar en GitHub
      action: publish:github
      input:
        description: Servicio HTTP en Rust/Axum - ${{ parameters.name }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: private

    - id: register
      name: Registrar en el catálogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repositorio en GitHub
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Ver en el catálogo
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
